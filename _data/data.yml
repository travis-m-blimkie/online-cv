experiences:
    title: Work Experience
    info:
      - role: Bioinformatician
        time: 2024 - Present
        company: Lee Lab, Simon Fraser University, Burnaby BC
        details: |
          - Led the development of a biomarker panel for the classification of sepsis patients using machine learning models, performing feature selection and integrating high-dimensional molecular data with clinical information
          - Spearheaded and advised on the analysis of numerous sequencing-based studies, investigating the biological interaction between the host immune response and bacterial & viral pathogens
          - Created a reverse vaccinology pipeline to identify candidates for a bacterial vaccine, leveraging large scale genomic data and utilizing high-performance cloud computing infrastructure
          - Collaborated with graduate students, post-docs, and research associates on complex data analyses, preparation of manuscripts, and management of code review sessions

      - role: Research Technician
        time: 2018 - 2024
        company: Hancock Lab, University of British Columbia, Vancouver BC
        details: |
          - Authored and co-authored 21 publications in peer-reviewed journals featuring results from omics data, including robust statistics and communication of findings with clear visualizations
          - Designed the Bioconductor package pathlinkR, following software engineering best practices and expanding the open-source toolbox for the scientific community
          - Developed three publicly available Shiny applications and dashboards (<a href="http://abcindex.ca" target="_blank" rel="nofollow">ABCindex</a>, <a href="http://septisearch.ca" target="_blank" rel="nofollow">Septisearch</a>, and <a href="http://metabridge.org" target="_blank" rel="nofollow">MetaBridge</a>), translating scientific needs into technical requirements and accessible interfaces
          - Guided training of new hires and co-op students, overseeing their involvement in ongoing projects, supervising data analysis, and preparing for final assessments

      - role: Surveyor
        time: "2016"
        company: Canadian Cencus, Statistics Canada, Waterloo ON
        details: |
          - Leveraged strong communication and interpersonal skills while conducting 2016 Census to effectively engage with diverse households and ensure accurate data collection during in-person interviews

      - role: Biological Technician
        time: "2015"
        company: Public Health Agency of Canada, Guelph ON
        details: |
          - Assembled Salmonella genomes for inclusion in a peer-reviewed journal article
          - Cultured and performed DNA extractions on 300 Salmonella isolates to generate data for a highly-cited publication

      - role: Biology Research Technician
        time: "2013"
        company: NucroTechnics, Scarborough ON
        details: |
          - Led NSERC-funded project to assess suitability and validity of histological staining techniques for implementation throughout the facility
          - Implemented GMP- and GLP-compliant Standard Operating Procedures (SOPs) for clinical testing following guidelines set out by Health Canada and the FDA

      - role: Research Assistant
        time: "2012"
        company: Canada Center for Inland Waters, Environment Canada, Burlington ON
        details: |
          - Adapted published protocol for water sample processing and treatment to suit sediment samples collected by lab, ensuring quality and accuracy of all subsequent analyses
          - Performed regular fieldwork as part of ongoing monitoring of water quality in the Great Lakes

projects:
    title: R/Shiny Applications
    assignments:
      - title: ABCindex
        link: "https://abcindex.ca"
        tagline: "Calculating and visualizing Anti-Biofilm Combination Index to assess the efficacy of drug combinations."

      - title: SeptiSearch
        link: "https://septisearch.ca"
        tagline: "Organizes molecular signatures of sepsis, and makes the data easily searchable and usable in analyses. Published in Frontiers in Immunology (2023)."

      - title: MetaBridge
        link: "https://metabridge.org"
        tagline: "Facilitates the integration of metabolomics data with other omics data types. Published in Current Protocols in Bioinformatics (2020)."

oss:
    title: Software Contributions
    contributions:
      - title: rnaseq_pipeline
        link: "https://github.com/travis-m-blimkie/rnaseq_pipeline"
        tagline: |
          PEP8 Python program for efficiently processing short-read RNA-Seq data. Uses FastQC, STAR, and HTSeq to generate count files for downstream analysis, and summarizes results with MultiQC.

      - title: pathlinkR
        link: "https://bioconductor.org/packages/pathlinkR/"
        tagline: |
          Analyze and interpret RNA-Seq results, with tools including pathway enrichment, PPI networks, and rich visualizations. Published in PLoS Computation Biology (2024).

