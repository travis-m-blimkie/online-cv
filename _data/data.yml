career-profile:
    title: Career Profile
    summary: |
      I have performed analyses of large and complex “multi-omic” datasets, working both individually and collaboratively with large teams to analyze data, collate results, and write publications. 
      Over the past six years I have gained extensive experience with the R language for data analysis, package creation and maintenance, and development and deployment of Shiny-based web applications to self-managed Linux servers.
      My work and training have given me a deep familiarity with  best practices for data collection, management, and analysis, including storage and organization of large “omic” data sets, and clinical information.

      
education:
    title: Education
    info:
      - degree: Masters of Bioinformatics
        university: University of Guelph
        time: 2016 - 2017
        details: |
          Learned core concepts of bioinformatics techniques and tools. Gained hands-on experience with an end-of-year project.

      - degree: BSc, Honors, Major in Biochemistry
        university: University of Waterloo
        time: 2010 - 2015
        details: |
          Studied a variety of subjects including organic and inorganic chemistry, cell biology, metabolism, and protein structures and dynamics.


experiences:
    title: Experiences
    info:
      - role: Bioinformatician
        time: 2018 - Present
        company: REW Hancock Lab, University of British Columbia, Vancouver, BC
        details: |
          - Lead  complex and detailed analyses of RNA-Seq and other “omics” data derived from a variety of sources, including in vitro and in vivo human and animal data sets, and bacterial experiments
          - Worked as part of large, multi-disciplinary groups to analyze omics data, and collate results into publications at high-impact journals
          - Developed and maintained R/Shiny web applications on self-managed Linux servers, and submitted a package to Bioconductor for use by the scientific community

      - role: Biological Technician
        time: 2015 - 2015
        company: Public Health Agency of Canada, Guelph, ON
        details: |
          - Created publication-worthy reference assemblies of multiple Salmonella genomes from next-generation sequence data using GUI- and command line-based programs
          - Independently designed new probe and primer sequences for implementation into the next version of a commercially-available molecular serotyping kit
          - Thoroughly tested three molecular serotyping methods as part of a published study comparing commercially-available kits
          - Extracted DNA from over 300 Salmonella isolates to be sequenced for use in a published validation study

      - role: Biology Research Technician
        time: 2013 - 2013
        company: NucroTechnics, Scarborough, ON
        details: |
          - Worked regularly with a variety of coworkers to dose animal specimens with multiple dosing methods such as dermal and intravenous
          - Independently solved problems as they arose while monitoring animals post-dosing
          - Prepared tissue samples to be fixed to microscope slides in the histology lab
          - Gained intimate knowledge of Standard Operating Procedures for clinical testing which furthered my written communication skills

      - role: Great Lakes Research Assistant
        time: 2012 - 2012
        company: Canada Center for Inland Waters, Environment Canada, Burlington, ON
        details: |
          - Adapted a published procedure in order to better suit water and sediment samples analyzed in our lab
          - Performed weekly field work to collect water samples and monitor water quality
          - Made use of a variety of complex lab equipment such as Flouromax/Auto-Sampler to test collected water samples
          

projects:
    title: Projects
    intro: >
      I have written or contributed significantly to the following publicly-available Shiny-based web applications:
    assignments:
      - title: SeptiSearch
        link: "septisearch.ca"
        tagline: "A Shiny app which organizes molecular signatures of sepsis, and makes the data easily searchable and usable in analyses."
        
      - title: MetaBridge
        link: "metabridge.org"
        tagline: "A Shiny app built to facilitate integration of metabolomics data with other omics data types."


oss:
    title: OSS Contributions
    intro: >
      I have contributed the following package to the Bioconductor software repository for use by the scientific community:
    contributions:
      - title: pathlinkR
        link: bioconductor.org/packages/pathlinkR/
        tagline: "Analyze and interpret RNA-Seq results, with tools including pathway enrichment and PPI networks."

