career-profile:
    title: Career Profile
    summary: |
      Bioinformatician with 8+ years of experience working with genomic, transcriptomic and proteomic datasets.
      Excellent knowledge of the processing, quality control, and robust statistical analysis of high-dimensional data derived from varied biological sources.

education:
    title: Education
    info:
      - degree: Masters of Bioinformatics
        university: University of Guelph
        time: 2016 - 2017
        details: |
          Learned core concepts of bioinformatics techniques and tools. Gained hands-on experience with an end-of-year project.

      - degree: BSc, Honours Biochemistry
        university: University of Waterloo
        time: 2010 - 2015
        details: |
          Studied a variety of subjects including organic and inorganic chemistry, cell biology, metabolism, and protein structures and dynamics.

experiences:
    title: Work Experience
    info:
      - role: Bioinformatician
        time: 2024 - Present
        company: Lee Lab, Simon Fraser University, Burnaby BC
        details: |
          - Led the development of a biomarker panel for the classification of sepsis patients using machine learning models, performing feature selection and integrating high-dimensional molecular data with clinical information
          - Spearheaded and advised on the analysis of numerous sequencing-based immunology studies within the lab, investigating the biological interaction between the host immune response and bacterial & viral pathogens
          - Created a reverse vaccinology pipeline to identify candidates for a bacterial vaccine, leveraging large scale publicly available genomic data and utilizing high-performance cloud computing infrastructure
          - Collaborated with graduate students, post-docs, and research associates on complex data analyses, preparation of manuscripts, and management of code review sessions

      - role: Research Technician
        time: 2018 - 2024
        company: Hancock Lab, University of British Columbia, Vancouver BC
        details: |
          - Authored or co-authored 21 publications in peer-reviewed journals featuring results from omics data, including robust statistics and communication of findings through clear visualizations
          - Designed the Bioconductor package pathlinkR, following software engineering best practices and expanding the open-source toolbox for the scientific community
          - Developed three publicly available Shiny applications and dashboards (ABCindex, Septisearch, and MetaBridge), translating scientific needs into technical requirements and accessible interfaces
          - Guided training of new hires and co-op students, overseeing their involvement in ongoing projects, supervising data analysis, and preparing for final assessments

      - role: Surveyor
        time: "2016"
        company: Canadian Cencus, Statistics Canada, Waterloo ON
        details: |
          - Leveraged strong communication and interpersonal skills while conducting 2016 Census to effectively engage with diverse households and confirm accurate data collection
          - Conducted in-person interviews with residents to collect census data, including demographic information, household composition, and socio-economic indicators

      - role: Biological Technician
        time: "2015"
        company: Public Health Agency of Canada, Guelph ON
        details: |
          - Assembled Salmonella genomes for inclusion in peer-reviewed journal article
          - Cultured and performed DNA extractions on 300 Salmonella isolates to generate data for highly-cited publication

      - role: Biology Research Technician
        time: "2013"
        company: NucroTechnics, Scarborough ON
        details: |
          - Led NSERC-funded project to assess suitability and validity of histological staining techniques for implementation throughout facility and reported findings to department supervisor
          - Implemented GMP- and GLP-compliant Standard Operating Procedures (SOPs) for clinical testing following guidelines set out by Health Canada and FDA

      - role: Research Assistant
        time: "2012"
        company: Canada Center for Inland Waters, Environment Canada, Burlington ON
        details: |
          - Adapted published protocol for water sample processing and treatment to suit sediment samples collected by lab, ensuring quality and accuracy of all subsequent analyses
          - Performed regular fieldwork as part of ongoing Environment Canada monitoring of water quality in Great Lakes

